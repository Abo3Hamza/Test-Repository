<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You - Ahmed Ramadan</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .thank-you-container {
            text-align: center;
            padding: 100px 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        
        .thank-you-icon {
            font-size: 80px;
            color: var(--success-color);
            margin-bottom: 30px;
        }
        
        .thank-you-title {
            font-size: 36px;
            color: var(--text-color);
            margin-bottom: 20px;
        }
        
        .thank-you-message {
            font-size: 18px;
            color: var(--text-color);
            margin-bottom: 40px;
            line-height: 1.6;
        }
        
        .btn-home {
            display: inline-block;
            background: linear-gradient(to right, #3498db, #2ecc71);
            color: var(--background-color);
            padding: 12px 30px;
            border-radius: 5px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        
        .btn-home:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        /* Fix for mobile navbar */
        header {
            position: relative;
            z-index: 1000;
        }
        
        @media (max-width: 768px) {
            .thank-you-title {
                font-size: 28px;
            }
            
            .thank-you-icon {
                font-size: 60px;
            }
        }

    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <img src="../images/logo.png" alt="AGpro Logo" style="height: 50px; width: auto; margin-right: 10px;">
                <h1>Ahmed Ramadan</h1>
            </div>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="projects.html">Projects</a></li>
                    <li><a href="about.html">About Me</a></li>
                    <li><a href="contact.html">Contact</a></li>
                    <li><a href="../thank-you.html">العربية</a></li>
                    <li><a href="#" id="theme-toggle" title="تبديل الوضع"><i class="fas fa-moon"></i></a></li>
                </ul>
            </nav>
            <div class="menu-toggle">
                <i class="fas fa-bars"></i>
            </div>
        </div>
    </header>

    <section class="thank-you-container">
        <div class="thank-you-icon">
            <i class="fas fa-check-circle"></i>
        </div>
        <h1 class="thank-you-title">Thank You for Your Message!</h1>
        <p class="thank-you-message">
            I have received your message and will get back to you as soon as possible. 
            Thank you for taking the time to reach out to me.
        </p>
        <a href="index.html" class="btn-home">Return to Homepage</a>
    </section>

   <div id="footer-placeholder"></div>

    <!-- Google Analytics -->
    <script src="../js/analytics.js"></script>
    <script src="../js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const menuToggle = document.querySelector('.menu-toggle');
            const nav = document.querySelector('nav');
            
            menuToggle.addEventListener('click', function() {
                nav.classList.toggle('active');
            });
        });
    </script>
</body>
</html>
